<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FerreCloud - Gestión de Alta Escala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'ferre-orange': '#f97316',
              'ferre-dark': '#020617',
              'ferre-light': '#f1f5f9',
            }
          }
        }
      }
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "firebase/app": "https://esm.sh/firebase@11.3.1/app",
    "firebase/firestore": "https://esm.sh/firebase@11.3.1/firestore",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
    <style>
      .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #e2e8f0; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #1e293b; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
      
      body {
        font-size: 15px;
        color: #020617;
        font-weight: 500;
      }

      input, select, textarea {
        border: 2px solid #94a3b8 !important;
        background-color: #ffffff !important;
        color: #000000 !important;
        font-weight: 800 !important;
        font-size: 14px !important;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #4f46e5 !important;
        background-color: #f8fafc !important;
        box-shadow: 0 0 0 6px rgba(79, 70, 229, 0.15) !important;
        transform: scale(1.01);
      }
      
      label {
        color: #0f172a !important;
        font-weight: 900 !important;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 11px;
      }

      th {
        color: #f1f5f9 !important;
        font-size: 12px !important;
        letter-spacing: 0.05em;
      }

      td {
        color: #020617 !important;
        font-weight: 700 !important;
      }
    </style>
  </head>
  <body class="bg-slate-200 text-slate-950 antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
